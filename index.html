<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Ecommerce</title>
    <link rel="stylesheet" href="./assets/style.css">

</head>
<body>
    <div class="layout">
        <header class="header">
            <h1>Mi Ecommerce</h1>
        </header>
        <aside class="sidebar">
            <h2>Categorías</h2>
            <div class="category-list">
                <p>Perfumes (13)</p>
                <p>Ropa (21)</p>
                <p>Accesorios (41)</p>
                <p>Zapatos (10)</p>
            </div>
        </aside>

    <main class="main">
        <section class="item-grid">
            <article class="card">
              <img class="item-card" src="./assets/images/Perfume1.jpg" alt="">
              <h3>Perfume myKingdom</h3>
               <span class="price">$31.400</span>
               <a href="#" class="btn btn-primary">Comprar</a>
            </article>

            <article class="card">
                <img class="item-card" src="./assets/images/Perfume2.jpg" alt="">
              <h3>Perfume Phantom</h3>
               <span class="price">$68.900</span>
               <a href="#" class="btn btn-primary">Comprar</a>
            </article>
                        
            <article class="card">
              <img class="item-card" src="./assets/images/Zapatos.jpg" alt="">
              <h3>Zapatos Docker</h3>
               <span class="price">$29.700</span>
                <a href="#" class="btn btn-primary">Comprar</a> 
            </article>
                        
            <article class="card">
              <img class="item-card" src="./assets/images/Poleron.jpg" alt="">
              <h3>Poleron Puma</h3>
               <span class="price">$44.700</span>
                <a href="#" class="btn btn-primary">Comprar</a>
            </article>
        </section>
    </main>
    </div>
    <footer class="footer">
    <p>@miecommerce</p>
    </footer>
    
</body>
</html>
